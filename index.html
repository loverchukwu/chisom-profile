<!DOCTYPE html>
<html>
    <head>
        <title>studentregform</title>
    </head>

    <body style="background-color: darkorange;">
        <h1>Student Registration Form</h1>

        <p>Fill in the form to register</p>

        <form>
            <label for="firstname">First Name</label><br>
            <input type="text" id="firstname"><br><br>
            <label for="secondname">Second Name</label><br>
            <input type="text" id="secondname"><br><br>
            <label for="Email">Email</label><br>
            <input type="text" id="Email"><br><br>
            <label for="DOB">Date Of Birth</label><br>
            <input type="text" id="DOB"><br><br>
            <label for="username">Username</label><br>
            <input type="text" id="username"><br><br>
            <label>Password</label><br>
            <input type="password"><br><br><br>


            <input type="radio" name="gender">Male<br>
            <input type="radio" name="gender">Female<br>
            <input type="radio" name="gender">Other<br><br>


            <label>Course</label>
            <select>
                <option>Biochemistry</option>
                <option>Engineering</option>
                <option>Computer science</option>
                <option>Mechanical Engineering</option>
                <option>fishery</option>
                <option>microbiology</option>
                <option>History</option>
            </select><br><br><br>

            <button>
                <a href="https://wa.link/3fwqvi">Submit</a>
            </button>

        </form>
    </body>
</html>
